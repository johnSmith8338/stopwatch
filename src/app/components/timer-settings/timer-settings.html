<h3>default settings</h3>
@if (settings(); as settings) {
    <section>
        <label>color</label>
        <app-color-picker [value]="settings.color" (valueChange)="setColor($event)" />
    </section>
    <section>
        <label>icon</label>
        <app-icon-picker [value]="settings.icon" (valueChange)="setIcon($event)" />
    </section>
    <section>
        <label>sound</label>
        <app-sound-picker [value]="settings.sound" (valueChange)="setSound($event)" />
    </section>
}
