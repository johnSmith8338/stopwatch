<div class="editor">
    <div class="inputs">
        <input type="number" [value]="hours()" (input)="updateHours($event)" [disabled]="disabled()" />
        <input type="number" [value]="minutes()" (input)="updateMinutes($event)" [disabled]="disabled()" />
        <input type="number" [value]="seconds()" (input)="updateSeconds($event)" [disabled]="disabled()" />
    </div>
    <div class="wheels">
        <app-wheel-picker name="hours"
            [items]="hoursItems"
            [value]="hours()"
            (valueChange)="hoursChange.emit($event)"
            [disabled]="disabled()" />

        <app-wheel-picker name="minutes"
            [items]="minuteItems"
            [value]="minutes()"
            (valueChange)="minutesChange.emit($event)"
            [disabled]="disabled()" />

        <app-wheel-picker name="seconds"
            [items]="secondItems"
            [value]="seconds()"
            (valueChange)="secondsChange.emit($event)"
            [disabled]="disabled()" />
    </div>
</div>
