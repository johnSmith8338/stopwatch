<div class="editor">
    <input [value]="model().title" (input)="updateTitle($event)" placeholder="title" />

    <app-duration-picker
        [hours]="model().hours"
        [minutes]="model().minutes"
        [seconds]="model().seconds"
        (hoursChange)="setHours($event)"
        (minutesChange)="setMinutes($event)"
        (secondsChange)="setSeconds($event)" />

    <div class="buttons">
        <button (click)="save.emit(model())">save</button>
        <button (click)="cancel.emit()">cancel</button>
    </div>
</div>
