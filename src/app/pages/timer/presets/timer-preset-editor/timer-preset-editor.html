<div class="editor">
    <input [value]="draft.activePreset()?.title" (input)="updateTitle($event)" placeholder="title" />

    <app-duration-picker />

    <app-icon-picker [value]="icon()" (valueChange)="setIcon($event)" />

    <app-color-picker [value]="color()" (valueChange)="setColor($event)" />

    <app-sound-picker [value]="sound()" (valueChange)="setSound($event)" />

    <div class="buttons">
        <button (click)="save()">save</button>
        <button (click)="cancel()">cancel</button>
    </div>
</div>
