<div class="editor">
    <input [value]="model().title" (input)="updateTitle($event)" placeholder="title" />

    <app-duration-picker />

    <app-icon-picker [value]="model().icon" (valueChange)="setIcon($event)" />

    <app-color-picker [value]="model().color" (valueChange)="setColor($event)" />

    <app-sound-picker [value]="model().sound" (valueChange)="setSound($event)" />

    <div class="buttons">
        <button (click)="save()">save</button>
        <button (click)="cancel()">cancel</button>
    </div>
</div>
