<div class="card" cdkDrag [style.border-left]="`8px solid ${timer().color}`">
    <div class="drag" cdkDragHandle>☰</div>
    <h3>
        <span [iconName]="timer().icon" class="icon"></span>
        <span>{{timer().title}}</span>
    </h3>
    <div>
        {{timer().hours | number:'2.0'}}:
        {{timer().minutes | number:'2.0'}}:
        {{timer().seconds | number:'2.0'}}
    </div>
    <div class="actions">
        <button (click)="start.emit(timer())">▶ start</button>
        <button (click)="edit.emit(timer())">edit</button>
        <button (click)="remove.emit(timer())">delete</button>
        <button (click)="favorite.emit(timer())">
            @if (timer().favorite) {
                ★
            }@else {
                ☆
            }
        </button>
    </div>
</div>
