<div class="list" 
    cdkDropList 
    [cdkDropListData]="timers()" 
    (cdkDropListDropped)="drop($event)">

    @for (timer of timers(); track timer.id) {
        <app-timer-preset-card 
            cdkDrag
            [timer]="timer"
            (favorite)="favorite(timer)"
            (start)="start(timer)"
            (edit)="edit(timer)"
            (remove)="remove(timer)" />
    }
</div>
