<div class="card">
    <app-timer-face [engine]="timer().engine" mode="display" />
    <h3>
        <span class="icon" [iconName]="timer().icon() || 'timer'"></span>
        <span>{{timer().title()}}</span>
    </h3>
    <div class="time">{{timer().engine.displayTime()}}</div>
    <div class="buttons">
        <button (click)="timer().start()">resume</button>
        <button (click)="timer().pause()">pause</button>
        <button (click)="timer().reset()">reset</button>
        <button (click)="removeTimer()">delete</button>
    </div>
</div>
