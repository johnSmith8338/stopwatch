<div class="preset-toolbar">
    <input type="search" placeholder="search" (input)="facade.searchChanged($event)" />
    <button (click)="facade.showAll()">all</button>
    <button (click)="facade.showFavorites()">favorites</button>
</div>

<h2>
    <span [iconName]="facade.icon()" class="icon"></span>
    <span>{{facade.title()}}</span>
</h2>

<app-timer-face />

<app-digital-display />

<app-timer-controls />

@if (facade.appSettings(); as settings) {
<app-duration-picker
    [hours]="settings.hours"
    [minutes]="settings.minutes"
    [seconds]="settings.seconds"
    [disabled]="preview.running()||facade.dialogOpened()"
    (hoursChange)="facade.updateHours($event)"
    (minutesChange)="facade.updateMinutes($event)"
    (secondsChange)="facade.updateSeconds($event)" />
}

<app-timer-settings />

<app-running-timer-list />

<button (click)="facade.createPreset()">+ create</button>
@if (facade.editing(); as timer) {
    <app-timer-preset-editor 
        [timer]="timer"
        (save)="facade.savePreset($event)"
        (cancel)="facade.cancelEditing()" />
}
@if (presetsSvc.presets.isLoading()) {
    <span>Loading...</span>
}@else {
<app-timer-preset-list
    [timers]="presetsSvc.presets.value() ?? []"
    (start)="facade.loadPreset($event)"
    (edit)="facade.editPreset($event)"
    (remove)="facade.requestDelete($event)"
    (favorite)="facade.toggleFavorite($event)"
    (reorder)="facade.reorder($event)" />
}

@if (facade.dialogOpened() && facade.activePreset(); as preset) {
<app-timer-finished-dialog
    [preset]="preset"
    (repeat)="facade.repeatInDialog()"
    (stop)="facade.stopInDialog()" />
}

@if(facade.deleting(); as timer) {
<app-confirm-dialog
    [message]="`delete ${timer.title}?`"
    (confirm)="facade.confirmDelete()"
    (cancel)="facade.cancelDelete()" />
}
