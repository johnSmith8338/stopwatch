<div class="preset-toolbar">
    <input type="search" placeholder="search" (input)="searchChanged($event)" />
    <button (click)="showAll()">all</button>
    <button (click)="showFavorites()">favorites</button>
</div>

<app-timer-face />

<app-digital-display [engine]="engineSvc" />

<app-controls [engine]="engineSvc" />
<button (click)="resetDefault()">default</button>

<app-duration-picker
    [hours]="hours()"
    [minutes]="minutes()"
    [seconds]="seconds()"
    [disabled]="engineSvc.running()"
    (hoursChange)="updateHours($event)"
    (minutesChange)="updateMinutes($event)"
    (secondsChange)="updateSeconds($event)" />

<button (click)="createPreset()">+ create</button>
@if (editing(); as timer) {
    <app-timer-preset-editor 
        [timer]="timer"
        (save)="savePreset($event)"
        (cancel)="cancelEditing()" />
}
<app-timer-preset-list
    [timers]="presets()"
    (start)="startPreset($event)"
    (edit)="editPreset($event)"
    (remove)="deletePreset($event)"
    (favorite)="toggleFavorite($event)" />
