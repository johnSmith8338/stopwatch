<app-timer-face />

<div class="timer-settings">
    <input type="number" 
        min="0" 
        [value]="hours()" 
        (input)="updateValue('hours',$event)"
        [disabled]="engineSvc.running()" />
    <span>:</span>
    <input type="number" 
        min="0" 
        max="59" 
        [value]="minutes()" 
        (input)="updateValue('minutes',$event)"
        [disabled]="engineSvc.running()" />
    <span>:</span>
    <input type="number" 
        min="0" 
        max="59" 
        [value]="seconds()" 
        (input)="updateValue('seconds',$event)"
        [disabled]="engineSvc.running()" />
</div>

<app-digital-display [engine]="engineSvc" />

<app-controls [engine]="engineSvc" />
<button (click)="resetDefault()">default</button>



<button (click)="createPreset()">+ create</button>
@if (editing(); as timer) {
    <app-timer-preset-editor 
        [timer]="timer"
        (save)="savePreset($event)"
        (cancel)="cancelEditing()" />
}
<app-timer-preset-list
    [timers]="presets()"
    (start)="startPreset($event)"
    (edit)="editPreset($event)"
    (remove)="deletePreset($event)" />



<app-wheel-picker name="hours" 
    [items]="hoursItems" 
    [value]="hours()" 
    (valueChange)="updateHours($event)" 
    [disabled]="engineSvc.running()" />
<app-wheel-picker name="minutes" 
    [items]="minuteItems" 
    [value]="minutes()" 
    (valueChange)="updateMinutes($event)"
    [disabled]="engineSvc.running()" />
<app-wheel-picker name="seconds" 
    [items]="secondItems" 
    [value]="seconds()" 
    (valueChange)="updateSeconds($event)"
    [disabled]="engineSvc.running()" />
