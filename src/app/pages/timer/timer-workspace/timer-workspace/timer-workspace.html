<h2>
    <span [iconName]="facade.draft.icon()" class="icon"></span>
    <span>{{facade.draft.title()}}</span>
</h2>

@if (editorOpened()) {
    @if (facade.appSettings(); as settings) {
        <app-duration-picker />
    }
    <button class="start-button" (click)="start()" [disabled]="facade.dialogOpened()">▶ START</button>
}@else {
    <button class="add-button" (click)="showEditor()">+ ADD TIMER</button>
}

<app-running-timer-list />
