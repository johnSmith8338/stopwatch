<div class="wheels">
    <app-wheel-picker name="hour"
        [items]="hourItems"
        [value]="draft.hour()"
        (valueChange)="draft.updateHour($event)" />
    <app-wheel-picker name="minute"
        [items]="minuteItems"
        [value]="draft.minute()"
        (valueChange)="draft.updateMinute($event)" />
</div>
