<div class="picker-mode">
    <button (click)="inputMode.set('dial')">dial</button>
    <button (click)="inputMode.set('inputs')">inputs</button>
    <button (click)="inputMode.set('wheel')">wheel</button>
</div>

@switch (inputMode()) {
    @case ('dial') {
        <app-alarm-face 
            [engine]="draft.faceEngine" 
            [mode]="faceMode()" 
            (dialStep)="dialChanged($event)"
            (dialFinished)="dialFinished()" />
    }
    @case ('inputs') {
        <app-alarm-inputs />
    }
    @case ('wheel') {
        <app-alarm-wheel-picker />
    }
}
